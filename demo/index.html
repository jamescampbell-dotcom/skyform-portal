<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Skyform Wind — Operations Portal (DEMO)</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070C16;--bg2:#0A1424;--card:#0C1B30;--card2:#0E2238;--card3:#102A44;--border:#1E3A5A;--hair:#16304C;
--text:#E6EDF6;--text2:#AEBCD0;--text3:#7C8CA6;--accent:#00D4FF;--acc2:#3B82F6;--green:#00FF88;--green2:#1FD18B;
--amber:#FFB703;--red:#FF6B35;--purple:#A78BFA;--pink:#F472B6;
--gbg:rgba(31,209,139,.14);--abg:rgba(255,183,3,.14);--rbg:rgba(255,107,53,.14);--bbg:rgba(0,212,255,.13);--pbg:rgba(167,139,250,.15);
--fh:'Rajdhani';--fd:'Plus Jakarta Sans';--fm:'JetBrains Mono';--shadow:0 18px 50px rgba(0,0,0,.5)}
body.alpine{--bg:#EDF0F6;--bg2:#E6EAF3;--card:#FFFFFF;--card2:#F6F8FC;--card3:#EEF2FA;--border:#DEE3EE;--hair:#E7EBF3;
--text:#141A2E;--text2:#3D4663;--text3:#8089A1;--accent:#0E7CC4;--acc2:#3B82F6;--green:#059669;--green2:#0F9D6B;
--amber:#C77800;--red:#DC4B1E;--purple:#7C3AED;--gbg:#D7F5E8;--abg:#FCEFCD;--rbg:#FBE2D8;--bbg:#DDF2FB;--pbg:#EEE6FE;--shadow:0 14px 40px rgba(30,50,90,.14)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.mono{font-family:var(--fm)} button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}::-webkit-scrollbar-track{background:transparent}
.demo-flag{position:fixed;top:0;left:0;right:0;height:24px;z-index:300;background:repeating-linear-gradient(45deg,#FFB703,#FFB703 13px,#0A1628 13px,#0A1628 26px);display:flex;align-items:center;justify-content:center}
.demo-flag span{background:#0A1628;color:#FFB703;font-family:var(--fh);font-weight:700;font-size:10px;letter-spacing:.22em;padding:2px 14px;border-radius:0 0 7px 7px;text-transform:uppercase}
.wrap{padding-top:24px}
/* ---------- LOGIN ---------- */
#login{position:relative;min-height:calc(100vh - 24px);display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;
 background:radial-gradient(ellipse 70% 55% at 22% 12%,rgba(0,212,255,.11),transparent 60%),radial-gradient(ellipse 60% 50% at 86% 92%,rgba(124,58,237,.13),transparent 62%),var(--bg)}
.lx{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.lx-grid{position:absolute;left:-20%;right:-20%;bottom:-12%;height:75%;background-image:linear-gradient(rgba(0,212,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.07) 1px,transparent 1px);background-size:48px 48px;transform:perspective(440px) rotateX(64deg);transform-origin:center bottom;-webkit-mask-image:linear-gradient(to top,#000,transparent 78%);mask-image:linear-gradient(to top,#000,transparent 78%);animation:gridmove 16s linear infinite}
@keyframes gridmove{from{background-position:0 0}to{background-position:0 48px}}
.lx-turb{position:absolute;color:var(--accent)} .lx-turb.a{right:-30px;bottom:-20px;width:360px;height:460px;opacity:.10}.lx-turb.b{left:-26px;top:24px;width:210px;height:270px;opacity:.06}
.blades{transform-box:view-box;transform-origin:60px 60px;animation:spin 10s linear infinite}.blades.slow{animation-duration:18s}
@keyframes spin{to{transform:rotate(360deg)}}
.particles span{position:absolute;bottom:-10px;width:3px;height:3px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);opacity:0;animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(0);opacity:0}12%{opacity:.7}100%{transform:translateY(-104vh);opacity:0}}
.login-card{position:relative;z-index:2;width:100%;max-width:560px;border-radius:22px;overflow:hidden;background:linear-gradient(180deg,rgba(13,33,55,.80),rgba(9,19,36,.93));backdrop-filter:blur(16px);border:1px solid rgba(0,212,255,.22);box-shadow:0 32px 90px rgba(0,0,0,.62),0 0 80px rgba(0,212,255,.08);animation:cardin .7s cubic-bezier(.2,.8,.2,1) both}
@keyframes cardin{from{opacity:0;transform:translateY(22px) scale(.985)}to{opacity:1;transform:none}}
.login-top{position:relative;padding:32px 34px 22px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(0,212,255,.06),transparent 55%)}
.login-top::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sweep 4.5s ease-in-out infinite}
@keyframes sweep{0%,100%{opacity:.15}50%{opacity:.75}}
.logo-badge{position:relative;width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#0D2137,#0A1628);display:inline-flex;align-items:center;justify-content:center;margin-bottom:11px;border:1px solid rgba(0,212,255,.4);box-shadow:0 0 32px rgba(0,212,255,.38)}
.logo-badge svg{width:38px;height:38px;color:var(--accent)}
.login-top h1{font-family:var(--fh);font-size:27px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;line-height:1;background:linear-gradient(180deg,#fff,#9fdcff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-top .tag{display:inline-flex;align-items:center;gap:8px;margin-top:10px;font-family:var(--fm);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent)}
.login-top .tag .pd{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 9px var(--green);animation:pulse 2s infinite}
.login-body{padding:22px 30px 10px}.login-body .lead{font-size:12.5px;color:var(--text2);text-align:center;margin-bottom:18px}.login-body .lead b{color:var(--text)}
.role-btn{position:relative;width:100%;display:flex;align-items:center;gap:15px;border:1px solid var(--border);border-radius:14px;padding:14px 16px 14px 18px;margin-bottom:11px;text-align:left;color:var(--text);overflow:hidden;opacity:0;background:linear-gradient(135deg,rgba(255,255,255,.04),rgba(255,255,255,.012));transition:transform .18s,border-color .18s,box-shadow .18s,background .18s;animation:rolein .5s ease both}
.role-btn::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rc,var(--accent));opacity:0;transition:.18s}
.role-btn:hover{transform:translateY(-2px);border-color:var(--rc,var(--accent));box-shadow:0 12px 30px rgba(0,0,0,.4),0 0 24px -8px var(--rc,var(--accent))}
.role-btn:hover::before{opacity:.95}.role-btn:hover .role-go{transform:translateX(4px);color:var(--rc)}.role-btn:hover .role-ic{box-shadow:0 0 22px -3px var(--rc);transform:scale(1.05)}
@keyframes rolein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.role-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--rc);background:var(--ricb);border:1px solid var(--border);transition:.18s}.role-ic svg{width:23px;height:23px}
.role-meta{flex:1;min-width:0}.role-meta .rn{font-family:var(--fd);font-weight:700;font-size:15px}.role-meta .rd{font-size:11px;color:var(--text3);margin-top:1px}
.role-go{margin-left:auto;color:var(--text3);font-size:20px;transition:.18s}
.login-foot{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;padding:14px 30px 22px;border-top:1px solid var(--border);margin-top:6px}
.login-foot .fi{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}.login-foot .pd{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}.login-foot .clk{font-family:var(--fm);color:var(--text2)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:540px){.role-meta .rd{display:none}}
/* ---------- APP SHELL ---------- */
#app{display:none}
.shell{display:flex;min-height:calc(100vh - 24px)}
.side{width:226px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:24px;height:calc(100vh - 24px)}
.side-top{padding:16px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px}
.side-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#0D2137,#0A1628);border:1px solid rgba(0,212,255,.4);display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(0,212,255,.3)}.side-logo svg{width:24px;height:24px;color:var(--accent)}
.side-logo-tx .n{font-family:var(--fh);font-weight:700;font-size:15px;letter-spacing:.06em;line-height:1}.side-logo-tx .s{font-family:var(--fm);font-size:7.5px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase}
.nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-sec{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:12px 10px 6px;font-weight:600}
.nav-i{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:9px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;margin-bottom:2px;transition:.13s;position:relative}
.nav-i svg{width:18px;height:18px;flex-shrink:0;opacity:.85}
.nav-i:hover{background:var(--card2);color:var(--text)}
.nav-i.on{background:var(--bbg);color:var(--accent)}.nav-i.on::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:2px;background:var(--accent)}
.nav-i .badge{margin-left:auto;font-family:var(--fm);font-size:9px;font-weight:700;background:var(--rbg);color:var(--red);padding:1px 7px;border-radius:10px}
.side-foot{padding:12px;border-top:1px solid var(--border)}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:58px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;position:sticky;top:24px;z-index:50}
.crumb{font-family:var(--fh);font-size:18px;font-weight:700;letter-spacing:.02em}
.search{margin-left:8px;flex:1;max-width:300px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;color:var(--text3);font-size:12px}
.search input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:100%;font-family:inherit}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--green)}.live .pd{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 9px var(--green);animation:pulse 2s infinite}
.icon-btn{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:7px 11px;color:var(--text2);font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px}.icon-btn:hover{color:var(--text);border-color:var(--accent)}
.who{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:5px 11px 5px 6px;cursor:pointer}.who:hover{border-color:var(--accent)}
.who .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#04121f;background:linear-gradient(135deg,var(--accent),var(--purple))}
.who .wn{font-size:12px;font-weight:600;line-height:1.1}.who .wr{font-size:9px;color:var(--text3)}
.content{padding:22px 24px 60px;max-width:1500px;width:100%;margin:0 auto}
/* hero */
.hero{display:flex;align-items:flex-end;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.hero h2{font-family:var(--fd);font-size:24px;font-weight:800;letter-spacing:-.5px}.hero .sub{font-size:12.5px;color:var(--text3);margin-top:3px}
.hero-act{margin-left:auto;display:flex;gap:9px}
.btn{border:1px solid var(--border);background:var(--card2);color:var(--text);border-radius:9px;padding:9px 15px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.14s}.btn:hover{border-color:var(--accent)}
.btn.pri{background:linear-gradient(135deg,var(--accent),var(--acc2));color:#04121f;border:none;box-shadow:0 6px 18px rgba(0,212,255,.25)}.btn.pri:hover{filter:brightness(1.08)}
.btn.gho{background:transparent}.btn.dng{color:var(--red);border-color:rgba(255,107,53,.4)}.btn.dng:hover{background:var(--rbg)}
.btn svg{width:15px;height:15px}.btn.sm{padding:6px 11px;font-size:11px}
/* grid + cards */
.grid{display:grid;gap:16px}
/* responsive auto-collapsing grids */
.g5{grid-template-columns:repeat(5,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.g-map{grid-template-columns:1.6fr 1fr}
.g-21{grid-template-columns:1fr 1.6fr}
.g-rep{grid-template-columns:1fr 1.4fr}
.g-ssow{grid-template-columns:1fr 1.6fr}
@media(max-width:1100px){.g5{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(2,1fr)}.g-map,.g-21,.g-rep,.g-ssow,.g3{grid-template-columns:1fr}}
@media(max-width:760px){.g5,.g4,.g3,.g2{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.g5,.g4,.g3,.g2{grid-template-columns:1fr 1fr}.hero h2{font-size:20px}.content{padding:16px 13px 50px}}
.card{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:18px}
.card.pad0{padding:0;overflow:hidden}
.card-h{display:flex;align-items:center;gap:9px;padding:15px 17px;border-bottom:1px solid var(--border)}
.card-h .t{font-family:var(--fh);font-size:14px;font-weight:700}.card-h .a{margin-left:auto;font-size:11px;color:var(--accent);font-weight:600;cursor:pointer}
.card-t{font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}.card-t .a{margin-left:auto;font-size:11px;color:var(--accent);font-weight:600;cursor:pointer;font-family:'Inter'}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden}
.kpi .ic{position:absolute;right:13px;top:13px;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center}.kpi .ic svg{width:17px;height:17px}
.kpi .v{font-family:var(--fm);font-size:27px;font-weight:700;line-height:1}.kpi .l{font-size:11px;color:var(--text3);margin-top:6px}.kpi .d{font-size:10px;margin-top:7px;font-weight:600}
.kpi::after{content:"";position:absolute;left:0;bottom:0;height:3px;width:100%;background:var(--kc,var(--accent));opacity:.6}
/* pills / dots */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.pill .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.g{background:var(--gbg);color:var(--green2)}.pill.a{background:var(--abg);color:var(--amber)}.pill.r{background:var(--rbg);color:var(--red)}.pill.b{background:var(--bbg);color:var(--accent)}.pill.p{background:var(--pbg);color:var(--purple)}.pill.n{background:var(--card3);color:var(--text3)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
/* table */
table{width:100%;border-collapse:collapse}
thead th{font-family:var(--fh);font-size:11px;font-weight:600;color:var(--accent);text-align:left;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0}
tbody td{padding:11px 14px;font-size:12.5px;border-bottom:1px solid var(--hair);color:var(--text2)}
tbody tr{transition:.1s}tbody tr:hover{background:var(--card2)}tbody tr.clk{cursor:pointer}
td .nm{color:var(--text);font-weight:600}
.av-sm{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#04121f;flex-shrink:0}
.bar{height:7px;border-radius:5px;background:var(--bg2);overflow:hidden;min-width:80px}.bar i{display:block;height:100%;border-radius:5px}
.toolbar{display:flex;align-items:center;gap:9px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.seg{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:3px}
.seg button{background:none;border:none;color:var(--text3);font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:7px}.seg button.on{background:var(--card3);color:var(--accent)}
.inp{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text);font-size:12px;outline:none}.inp:focus{border-color:var(--accent)}
/* map */
.mapwrap{position:relative;background:radial-gradient(ellipse at 42% 32%,#0A1A2E,#050A12 72%);border-radius:13px;overflow:hidden;border:1px solid var(--border)}
body.alpine .mapwrap{background:radial-gradient(ellipse at 42% 32%,#EAF0FA,#fff 72%)}
.mapgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.05) 1px,transparent 1px);background-size:30px 30px}
.mk-lab{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:9.5px;transform:translateY(-50%);pointer-events:none;white-space:nowrap}.mk-lab .t{font-family:var(--fh);font-weight:700;font-size:10.5px}.mk-lab .s{color:var(--text3);font-size:8px}
/* planner */
.planner{overflow-x:auto}
.ptable{min-width:760px;border-collapse:separate;border-spacing:0}
.ptable th{background:var(--bg2);font-family:var(--fh);font-size:11px;color:var(--text2);padding:9px 8px;border-bottom:1px solid var(--border);text-align:center;font-weight:600}
.ptable th.sitecol{text-align:left;width:150px;position:sticky;left:0;background:var(--bg2);z-index:2}
.ptable td.sitecol{position:sticky;left:0;background:var(--card);z-index:1;border-right:1px solid var(--border)}
.pcell{height:62px;border:1px dashed transparent;border-bottom:1px solid var(--hair);border-right:1px solid var(--hair);vertical-align:top;padding:4px;min-width:104px;transition:.12s}
.pcell.over{background:var(--bbg);border:1px dashed var(--accent)}
.sitecell{display:flex;align-items:center;gap:8px;padding:8px 10px}.sitecell .si{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center}.sitecell .nm{font-family:var(--fh);font-weight:700;font-size:13px}.sitecell .ty{font-size:8.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.echip{display:flex;align-items:center;gap:6px;background:var(--card3);border:1px solid var(--border);border-radius:8px;padding:4px 7px;margin-bottom:4px;font-size:11px;cursor:grab;position:relative}
.echip.bad{border-color:var(--red);box-shadow:0 0 0 1px rgba(255,107,53,.3)}
.echip.clash{border-color:var(--amber)}
.echip .x{margin-left:auto;color:var(--text3);font-size:13px;cursor:pointer;padding:0 2px}.echip .x:hover{color:var(--red)}
.echip .fl{font-size:9px}
.pool{display:flex;flex-wrap:wrap;gap:7px;padding:14px 16px}
.pool .echip{margin:0;cursor:grab}
.drawer-back{position:fixed;inset:0;background:rgba(3,8,18,.6);backdrop-filter:blur(3px);z-index:200;opacity:0;transition:.2s;display:flex;justify-content:flex-end}
.drawer-back.show{opacity:1}
.drawer{width:480px;max-width:94vw;background:var(--bg);border-left:1px solid var(--border);height:100%;overflow-y:auto;transform:translateX(30px);transition:.22s;box-shadow:-20px 0 60px rgba(0,0,0,.5)}
.drawer-back.show .drawer{transform:none}
.drawer-h{display:flex;align-items:center;gap:12px;padding:20px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:2}
.drawer-h .x{margin-left:auto;background:var(--card2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.drawer-b{padding:20px 22px}
.modal-back{position:fixed;inset:0;background:rgba(3,8,18,.66);backdrop-filter:blur(4px);z-index:210;display:flex;align-items:center;justify-content:center;opacity:0;transition:.18s;padding:20px}
.modal-back.show{opacity:1}
.modal{width:440px;max-width:96vw;background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);transform:scale(.96);transition:.18s;overflow:hidden}
.modal-back.show .modal{transform:none}
.modal-h{padding:18px 20px;border-bottom:1px solid var(--border);font-family:var(--fh);font-weight:700;font-size:16px}

function save(){try{localStorage.setItem(SKEY,JSON.stringify(DB));}catch(e){}}
function reset(){DB=genData();save();toast('Demo data reset');render();}
function audit(act){DB.audit.unshift({ts:Date.now(),who:DEMO[S.role].name,act:act});if(DB.audit.length>200)DB.audit.pop();}

var DEMO={
 engineer:{name:'Aiden Ross',role:'Inspection Engineer',av:'AR',engId:'E01'},
 manager:{name:'Jordan Mills',role:'Operations Manager',av:'JM'},
 director:{name:'Alex Skye',role:'Director',av:'AS'},

function isEngView(){return S.role==='engineer' || (S.role==='dual' && S.profile==='me');}
function canManage(){return ['manager','director','dual','hseq'].indexOf(S.role)>=0 && !isEngView();}
function canDelete(){return S.role==='director';}
function canSignoff(){return ['hseq','director'].indexOf(S.role)>=0;}
function myEngId(){return DEMO[S.role].engId;}

/* ---------- domain helpers ---------- */
function eById(id){return DB.engineers.filter(function(e){return e.id===id;})[0];}
function statusOf(rec){ if(rec.pending) return 'pending'; if(!rec.certName) return 'action'; var d=daysUntil(rec.expires||rec.dueCal); if(d<0) return 'expired'; if(d<60) return 'expiring'; return 'valid';}
function STMETA(s){return {valid:['g','Valid'],expiring:['a','Expiring'],expired:['r','Expired'],pending:['b','Pending'],action:['r','Missing']}[s]||['n',s];}
function recsFor(engId){return {ppe:DB.ppe.filter(function(x){return x.engId===engId;}),train:DB.training.filter(function(x){return x.engId===engId;}),cal:DB.calibration.filter(function(x){return x.engId===engId;})};}
function compOf(engId){var R=recsFor(engId);var all=R.ppe.concat(R.train,R.cal);if(!all.length)return {pct:100,st:'g'};var sc=0;all.forEach(function(x){var s=statusOf(x);sc+= s==='valid'?1:(s==='expiring'||s==='pending'?0.5:0);});var pct=Math.round(sc/all.length*100);return {pct:pct,st:pct>=88?'g':pct>=72?'a':'r'};}
function compColor(st){return st==='g'?'var(--green2)':st==='a'?'var(--amber)':'var(--red)';}
function fleetPct(){var s=0;DB.engineers.forEach(function(e){s+=compOf(e.id).pct;});return Math.round(s/DB.engineers.length);}
function pendingCount(){return DB.ppe.concat(DB.training,DB.calibration).filter(function(x){return x.pending;}).length;}
function attentionList(){var out=[];DB.engineers.forEach(function(e){var R=recsFor(e.id);R.ppe.concat(R.train,R.cal).forEach(function(x){var s=statusOf(x);if(s==='expired'||s==='expiring'||s==='action'||s==='pending'){out.push({eng:e,rec:x,s:s,kind:x.type?'PPE':x.cert?'Training':'Calibration',label:x.type||x.cert||x.tool});}});});return out.sort(function(a,b){var o={expired:0,action:1,pending:2,expiring:3};return o[a.s]-o[b.s];});}

function view(){

   case 'dashboard':return vDashboard();

/* ---------- Registers (PPE / Training / Calibration) ---------- */
function vRegister(kind){
 var data,cols,titleN;
 var eng=isEngView()?myEngId():null;
 if(kind==='ppe'){titleN='PPE Register';data=DB.ppe;cols=['Engineer','PPE item','Issued','Expires','Status','Certificate'];}
 if(kind==='training'){titleN='Training & Competence';data=DB.training;cols=['Engineer','Qualification','Obtained','Expires','Status','Certificate'];}
 if(kind==='calibration'){titleN='Calibration Register';data=DB.calibration;cols=['Owner','Tool','Serial','Calibrated','Due','Status','Certificate'];}
 if(eng) data=data.filter(function(x){return x.engId===eng;});
 if(S.filter!=='all') data=data.filter(function(x){return statusOf(x)===S.filter;});
 if(S.q){var q=S.q.toLowerCase();data=data.filter(function(x){var e=eById(x.engId);return ((x.type||x.cert||x.tool||'')+ ' '+(e?e.name:'')).toLowerCase().indexOf(q)>=0;});}
 var counts={all:0,valid:0,expiring:0,expired:0,pending:0};(eng?(kind==='ppe'?DB.ppe:kind==='training'?DB.training:DB.calibration).filter(function(x){return x.engId===eng;}):(kind==='ppe'?DB.ppe:kind==='training'?DB.training:DB.calibration)).forEach(function(x){counts.all++;var s=statusOf(x);if(counts[s]!==undefined)counts[s]++;});
 var seg=['all','valid','expiring','expired','pending'].map(function(f){return '<button class="'+(S.filter===f?'on':'')+'" data-act="filter" data-f="'+f+'">'+f.charAt(0).toUpperCase()+f.slice(1)+' ('+(counts[f]||0)+')</button>';}).join('');
 var head=cols.map(function(c){return '<th>'+c+'</th>';}).join('');
 var rows=data.map(function(x){
   var e=eById(x.engId);var s=statusOf(x);var m=STMETA(s);
   var cert = certCell(x,kind);
   if(kind==='calibration'){
     return '<tr class="clk" data-act="open" data-kind="'+kind+'" data-id="'+x.id+'"><td><div style="display:flex;align-items:center;gap:9px"><span class="av-sm" style="background:linear-gradient(135deg,var(--accent),var(--purple))">'+(e?e.init:'?')+'</span><span class="nm">'+(e?esc(e.name):'Pool')+'</span></div></td><td>'+esc(x.tool)+'</td><td class="mono" style="font-size:11px">'+esc(x.serial)+'</td><td>'+fmt(x.lastCal)+'</td><td>'+fmt(x.dueCal)+'</td><td><span class="pill '+m[0]+'"><span class="d"></span>'+m[1]+'</span></td><td>'+cert+'</td></tr>';
   }

  '</div>'+
  '<div class="grid g2">'+block('My PPE',R.ppe,'ppe')+block('My Calibration',R.cal,'calibration')+'</div>'+
  '<div style="height:16px"></div>'+block('My Training & Competence',R.train,'training')+
  '<div class="miniwarn" style="margin-top:14px">'+I.lock+' You can view the <b>status</b> of your competence certificates, and upload new ones, but the competence PDFs themselves are held by the office (PPE &amp; calibration certs you can download).</div>';
}

/* ===================== INTERACTIVITY ===================== */
function bindDynamic(){
 // search
 var q=$('#q');if(q){q.oninput=function(){S.q=q.value;var c=$('#content');if(c)c.innerHTML=view();bindDynamic();var qq=$('#q');if(qq){qq.focus();qq.value=S.q;qq.setSelectionRange(S.q.length,S.q.length);}};}
 // drag & drop (planner)
 $$('.echip[draggable=true]').forEach(function(ch){
   ch.addEventListener('dragstart',function(ev){ev.dataTransfer.setData('text/plain',JSON.stringify({eng:ch.dataset.eng,from:ch.dataset.from||'cell',week:ch.dataset.week,site:ch.dataset.site}));setTimeout(function(){ch.style.opacity='.4';},0);});
   ch.addEventListener('dragend',function(){ch.style.opacity='';});
 });
 $$('.pcell').forEach(function(cell){
   cell.addEventListener('dragover',function(ev){ev.preventDefault();cell.classList.add('over');});
   cell.addEventListener('dragleave',function(){cell.classList.remove('over');});
   cell.addEventListener('drop',function(ev){ev.preventDefault();cell.classList.remove('over');var d;try{d=JSON.parse(ev.dataTransfer.getData('text/plain'));}catch(e){return;}assignEng(d.eng,cell.dataset.site,parseInt(cell.dataset.week),d);});
 });
}

document.addEventListener('click',function(ev){
 var t=ev.target.closest('[data-act]');
 var menu=$('#rolemenu');
 if(menu && !ev.target.closest('#rolemenu') && !ev.target.closest('[data-act=menu]')){menu.remove();}
 if(!t)return;
 var a=t.dataset.act;
 if(a==='signin'){S.role=t.dataset.role;S.profile=S.role==='dual'?'admin':'admin';S.tab=(S.role==='engineer')?'mycompliance':'dashboard';S.sel=null;render();var nm=DEMO[S.role].name;setTimeout(function(){toast('Signed in as '+nm+' · '+(S.role==='dual'?'Dual role':DEMO[S.role].role));},150);return;}
 if(a==='tab'){S.tab=t.dataset.tab;S.sel=null;S.filter='all';render();return;}
 if(a==='theme'){S.theme=S.theme==='night'?'alpine':'night';render();return;}
 if(a==='reset'){reset();return;}
 if(a==='filter'){S.filter=t.dataset.f;var c=$('#content');c.innerHTML=view();bindDynamic();return;}
 if(a==='open'){openRecord(t.dataset.kind,t.dataset.id);return;}
 if(a==='profile'){S.sel=t.dataset.id;S.tab='engineers';render();return;}
 if(a==='dl'){toast('Opening '+(t.dataset.name||'certificate')+' (demo)');return;}
 if(a==='upload'){uploadModal(t.dataset.kind,t.dataset.id);return;}
 if(a==='verify'){doVerify(t.dataset.kind,t.dataset.id);return;}
 if(a==='reject'){doReject(t.dataset.kind,t.dataset.id);return;}
 if(a==='delrec'){doDelete(t.dataset.kind,t.dataset.id);return;}
 if(a==='unassign'){unassign(t.dataset.eng,t.dataset.site,parseInt(t.dataset.week));return;}
 if(a==='rams'){toggleRams(t.dataset.id);return;}
 if(a==='export'){doExport();return;}
 if(a==='newrec'){newRecordModal(t.dataset.kind);return;}
 if(a==='assignscope'){assignScopeModal(t.dataset.id);return;}
 if(a==='archeng'){archiveEng(t.dataset.id);return;}
 if(a==='menu'){roleMenu(t);return;}
 if(a==='setrole'){S.role=t.dataset.role;S.profile='admin';S.tab=S.role==='engineer'?'mycompliance':'dashboard';S.sel=null;$('#rolemenu')&&$('#rolemenu').remove();render();return;}
 if(a==='setprofile'){S.profile=t.dataset.p;$('#rolemenu')&&$('#rolemenu').remove();S.tab=S.profile==='me'?'mycompliance':'dashboard';render();return;}
 if(a==='signout'){$('#rolemenu')&&$('#rolemenu').remove();S.role=null;S.sel=null;S.tab='dashboard';closeOverlay();render();return;}
 if(a==='closeov'){closeOverlay();return;}
},true);

/* actions */
function assignEng(engId,siteId,week,d){
 if(d && d.from==='cell' && d.site && d.week!=null){ // move: remove old
   DB.assign=DB.assign.filter(function(x){return !(x.engId===d.eng&&x.siteId===d.site&&x.week==d.week);});
 }
 if(DB.assign.some(function(x){return x.engId===engId&&x.siteId===siteId&&x.week===week;})){var cc=$('#content');cc.innerHTML=view();bindDynamic();return;}
 DB.assign.push({engId:engId,siteId:siteId,week:week});
 var e=eById(engId);var s=DB.sites.filter(function(x){return x.id===siteId;})[0];var comp=compOf(engId);
 audit('Assigned '+e.name+' to '+s.name+' ('+DB.weeks[week].label+')');save();
 var clash=DB.assign.filter(function(x){return x.engId===engId&&x.week===week;}).length>1;
 toast((comp.st==='r'?'⚠ '+e.name+' assigned — compliance gap':clash?'⚠ '+e.name+' double-booked '+DB.weeks[week].label:e.name+' → '+s.name));
 var c=$('#content');c.innerHTML=view();bindDynamic();
}
function unassign(engId,siteId,week){DB.assign=DB.assign.filter(function(x){return !(x.engId===engId&&x.siteId===siteId&&x.week===week);});var e=eById(engId);audit('Removed '+e.name+' from deployment');save();var c=$('#content');c.innerHTML=view();bindDynamic();}
function recArr(kind){return kind==='ppe'?DB.ppe:kind==='training'?DB.training:DB.calibration;}
function findRec(kind,id){return recArr(kind).filter(function(x){return x.id===id;})[0];}
function doVerify(kind,id){var x=findRec(kind,id);x.pending=false;x.verified=true;audit('Verified '+(x.type||x.cert||x.tool)+' for '+(eById(x.engId)?eById(x.engId).name:'pool'));save();toast('Certificate verified ✓');closeOverlay();var c=$('#content');c.innerHTML=view();bindDynamic();}
function doReject(kind,id){var x=findRec(kind,id);x.pending=false;x.verified=false;x.certName=null;audit('Rejected certificate for '+(x.type||x.cert||x.tool));save();toast('Certificate rejected');closeOverlay();var c=$('#content');c.innerHTML=view();bindDynamic();}
function doDelete(kind,id){var x=findRec(kind,id);var arr=recArr(kind);var i=arr.indexOf(x);arr.splice(i,1);audit('Permanently deleted record '+(x.type||x.cert||x.tool)+' (Director)');save();toast('Record permanently deleted');closeOverlay();var c=$('#content');c.innerHTML=view();bindDynamic();}
function toggleRams(siteId){var s=DB.sites.filter(function(x){return x.id===siteId;})[0];s.rams=s.rams==='approved'?'awaiting':'approved';audit((s.rams==='approved'?'Approved':'Revoked')+' SSOW/RAMS for '+s.name);save();toast('RAMS '+(s.rams==='approved'?'approved ✓':'revoked')+' — '+s.name);var c=$('#content');c.innerHTML=view();bindDynamic();}
function archiveEng(id){var e=eById(id);audit('Archived engineer '+e.name+' (Director)');toast(e.name+' archived (demo)');}
function doExport(){
 var rows=[['Engineer','Type','Item','Expires','Status','Verified']];
 DB.ppe.forEach(function(x){var e=eById(x.engId);rows.push([e.name,'PPE',x.type,x.expires,statusOf(x),x.verified]);});
 DB.training.forEach(function(x){var e=eById(x.engId);rows.push([e.name,'Training',x.cert,x.expires,statusOf(x),x.verified]);});
 DB.calibration.forEach(function(x){var e=eById(x.engId);rows.push([e?e.name:'Pool','Calibration',x.tool,x.dueCal,statusOf(x),x.verified]);});
 var csv=rows.map(function(r){return r.map(function(c){return '"'+(''+c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
 var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='skyform_compliance_demo.csv';a.click();URL.revokeObjectURL(url);toast('Exported compliance CSV');
}

/* overlay: drawer + modal */
function closeOverlay(){var o=$('#overlay');o.innerHTML='';}
function drawer(title,sub,body,col){
 var o=$('#overlay');
 o.innerHTML='<div class="drawer-back" data-act="closeov"><div class="drawer" onclick="event.stopPropagation()"><div class="drawer-h"><div style="width:6px;height:34px;border-radius:3px;background:'+(col||'var(--accent)')+'"></div><div><div style="font-family:var(--fh);font-weight:700;font-size:17px">'+esc(title)+'</div>'+(sub||'')+'</div><button class="x" data-act="closeov">'+I.x+'</button></div><div class="drawer-b">'+body+'</div></div></div>';
 requestAnimationFrame(function(){$('.drawer-back').classList.add('show');});
}
function modal(title,body,footer){
 var o=$('#overlay');
 o.innerHTML='<div class="modal-back" data-act="closeov"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h">'+esc(title)+'</div><div class="modal-b">'+body+'</div><div class="modal-f">'+footer+'</div></div></div>';
 requestAnimationFrame(function(){$('.modal-back').classList.add('show');});
}
function uploadModal(kind,id){
 var x=findRec(kind,id);var label=x.type||x.cert||x.tool;
 var dexp=x.expires||x.dueCal||iso(new Date(TODAY.getFullYear()+2,TODAY.getMonth(),TODAY.getDate()));
 modal('Upload certificate',
  '<div class="field"><label>'+esc(label)+'</label><div class="uploadzone" id="uz">'+I.up+'<div><b id="uzn">Choose a file</b> or drag &amp; drop</div><div style="font-size:10px;margin-top:4px">PDF, JPG or PNG · simulated in demo</div></div></div>'+
  '<div class="field"><label>'+(kind==='calibration'?'Next calibration due':'Expiry date')+'</label><input class="inp" type="date" id="uexp" value="'+dexp+'"></div>',
  '<button class="btn gho" data-act="closeov">Cancel</button><button class="btn pri" id="uconfirm">'+I.up+' Upload</button>');
 var picked={name:null};
 $('#uz').onclick=function(){var inp=document.createElement('input');inp.type='file';inp.onchange=function(){if(inp.files[0]){picked.name=inp.files[0].name;$('#uzn').textContent=picked.name;}};inp.click();};
 $('#uconfirm').onclick=function(){
   var exp=$('#uexp').value;var nm=picked.name||((label.replace(/[^A-Za-z0-9]/g,'_'))+'_'+(x.engId||'tool')+'.pdf');
   if(kind==='calibration')x.dueCal=exp; else x.expires=exp;
   x.certName=nm;x.pending=true;x.verified=false;
   audit((isEngView()?'Engineer uploaded ':'Uploaded ')+label+' certificate'+(x.engId?(' for '+(eById(x.engId)?eById(x.engId).name:'')):''));save();
   closeOverlay();toast('Certificate uploaded — pending verification');
   var c=$('#content');c.innerHTML=view();bindDynamic();
 };
}
function newRecordModal(kind){
 var opts,engOpts=DB.engineers.map(function(e){return '<option value="'+e.id+'">'+esc(e.name)+'</option>';}).join('');
 if(kind==='ppe')opts=PPE_TYPES; else if(kind==='training')opts=TRAIN_CAT; else opts=TOOL_TYPES;
 var typeOpts=opts.map(function(o){return '<option>'+esc(o)+'</option>';}).join('');
 modal('Add '+(kind==='ppe'?'PPE':kind==='training'?'training':'calibration')+' record',
  (kind!=='calibration'?'<div class="field"><label>Engineer</label><select class="inp" id="neng">'+engOpts+'</select></div>':'<div class="field"><label>Owner</label><select class="inp" id="neng">'+engOpts+'</select></div>')+
  '<div class="field"><label>'+(kind==='calibration'?'Tool':kind==='training'?'Qualification':'PPE item')+'</label><select class="inp" id="ntype">'+typeOpts+'</select></div>'+
  '<div class="field"><label>'+(kind==='calibration'?'Next due':'Expiry date')+'</label><input class="inp" type="date" id="nexp" value="'+iso(new Date(TODAY.getFullYear()+2,TODAY.getMonth(),TODAY.getDate()))+'"></div>',
  '<button class="btn gho" data-act="closeov">Cancel</button><button class="btn pri" id="nconfirm">'+I.plus+' Add</button>');
 $('#nconfirm').onclick=function(){
   var eng=$('#neng').value,type=$('#ntype').value,exp=$('#nexp').value;
   var idn=(kind[0].toUpperCase())+(Date.now()%100000);
   if(kind==='ppe')DB.ppe.push({id:'P'+idn,engId:eng,type:type,issued:iso(TODAY),expires:exp,certName:null,verified:false,pending:false});
   if(kind==='training')DB.training.push({id:'T'+idn,engId:eng,cert:type,obtained:iso(TODAY),expires:exp,certName:null,verified:false,pending:false,competence:true});
   if(kind==='calibration')DB.calibration.push({id:'C'+idn,tool:type,serial:type.split(' ')[0].toUpperCase().slice(0,3)+'-NEW',engId:eng,lastCal:iso(TODAY),dueCal:exp,certName:null,verified:false,pending:false});
   audit('Added '+type+' record');save();closeOverlay();toast('Record added — upload a certificate next');var c=$('#content');c.innerHTML=view();bindDynamic();
 };
}
function assignScopeModal(id){
 var w=DB.scopes.filter(function(x){return x.id===id;})[0];
 var opts=DB.engineers.filter(function(e){return w.engIds.indexOf(e.id)<0;}).map(function(e){
   var has=w.required.every(function(rc){return DB.training.some(function(t){return t.engId===e.id&&t.cert===rc&&statusOf(t)!=='expired'&&!t.pending;});});
   return '<option value="'+e.id+'">'+esc(e.name)+(has?' ✓ qualified':' ⚠ missing cert')+'</option>';}).join('');
 modal('Assign engineer to “'+esc(w.name)+'”',
  '<div class="field"><label>Engineer</label><select class="inp" id="seng">'+opts+'</select></div><div style="font-size:11px;color:var(--text3)">The scope requires: '+w.required.map(esc).join(', ')+'</div>',
  '<button class="btn gho" data-act="closeov">Cancel</button><button class="btn pri" id="sconfirm">Assign</button>');
 $('#sconfirm').onclick=function(){var eng=$('#seng').value;if(eng){w.engIds.push(eng);audit('Assigned '+eById(eng).name+' to scope '+w.name);save();}closeOverlay();toast('Engineer assigned to scope');var c=$('#content');c.innerHTML=view();bindDynamic();};
}
function roleMenu(anchor){
 var ex=$('#rolemenu');if(ex){ex.remove();return;}
 var roles=[['engineer','Engineer'],['manager','Manager'],['director','Director'],['hseq','HSEQ Manager'],['dual','Dual role']];
 var items=roles.map(function(r){return '<div class="dd-o'+(r[0]===S.role?' on':'')+'" data-act="setrole" data-role="'+r[0]+'">'+r[1]+(r[0]===S.role?' <span style="margin-left:auto">✓</span>':'')+'</div>';}).join('');
 var prof='';
 if(S.role==='dual'){prof='<div class="dd-h" style="border-top:1px solid var(--border)">Your profile</div>'+
   '<div class="dd-o'+(S.profile==='admin'?' on':'')+'" data-act="setprofile" data-p="admin">Admin profile</div>'+
   '<div class="dd-o'+(S.profile==='me'?' on':'')+'" data-act="setprofile" data-p="me">My engineer profile</div>';}
 var dd=document.createElement('div');dd.className='dd';dd.id='rolemenu';dd.style.top='52px';dd.style.right='22px';
 dd.innerHTML='<div class="dd-h">Demo — switch role</div>'+items+prof+'<div class="dd-o" style="border-top:1px solid var(--border);color:var(--text3)" data-act="signout">↩ Back to sign-in</div>';
 $('.topbar').appendChild(dd);
}
function toast(msg){var t=$('#toast');t.innerHTML=I.chk+'<span>'+esc(msg)+'</span>';t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},2600);}

document.addEventListener('keydown',function(ev){
 if(ev.key==='Escape'){var o=$('#overlay');if(o&&o.innerHTML){closeOverlay();return;}var rm=$('#rolemenu');if(rm){rm.remove();}}
});

/* ---------- boot ---------- */
load();render();

</script></body></html>
