<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Skyform Wind Operations Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#c9d1d9;--text3:#8b949e;
  --green:#3fb950;--gbg:rgba(63,185,80,.12);
  --blue:#58a6ff;--accent:#1f6feb;
  --red:#f85149;--amber:#d29922;
  --r:8px;--rl:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

/* ── PORTAL CARD ─────────────────────────────── */
.portal-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);
  width:100%;max-width:380px;overflow:hidden;
}
.portal-header{
  background:linear-gradient(135deg,#0d2818 0%,#1B4332 100%);
  padding:28px 24px 22px;text-align:center;border-bottom:1px solid #2D6A4F;
}
.portal-logo{height:44px;object-fit:contain;margin-bottom:14px;}
.portal-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;}
.portal-sub{font-size:12px;color:#52B788;letter-spacing:.02em;}

.portal-body{padding:24px;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:10.5px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.field input{
  width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);
  padding:10px 13px;font-family:"DM Sans",sans-serif;font-size:14px;color:var(--text);
  outline:none;transition:border-color .15s;
}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text3);}

.login-btn{
  width:100%;padding:12px;margin-top:6px;
  background:linear-gradient(135deg,#1B4332,#2D6A4F);
  border:1px solid #52B788;border-radius:var(--r);
  font-family:"DM Sans",sans-serif;font-size:14px;font-weight:600;
  color:#fff;cursor:pointer;transition:all .15s;
}
.login-btn:hover{background:linear-gradient(135deg,#2D6A4F,#3fb950);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}

.err{
  font-size:12px;color:var(--red);text-align:center;margin-top:10px;
  min-height:18px;transition:opacity .2s;
}
.loading-msg{font-size:12px;color:var(--text3);text-align:center;margin-top:8px;}

/* ── FOOTER ─────────────────────────────────── */
.portal-footer{
  margin-top:24px;text-align:center;font-size:11px;color:var(--text3);
}
.portal-footer a{color:var(--text3);text-decoration:none;}

/* ── STATUS DOTS ─────────────────────────────── */
.status-row{display:flex;gap:6px;justify-content:center;margin-top:16px;
  padding-top:16px;border-top:1px solid var(--border);}
.status-dot{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);}
.status-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);
  animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── ROLE PICKER ─────────────────────────────── */
.role-btn{
  width:100%;display:flex;align-items:center;gap:14px;
  padding:14px 16px;margin-bottom:10px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--r);cursor:pointer;
  font-family:"DM Sans",sans-serif;transition:all .15s;text-align:left;
}
.role-btn:hover{border-color:var(--accent);background:var(--bg2);}
.role-btn-eng:hover{border-color:var(--green);}
.role-btn-mgmt:hover{border-color:#58a6ff;}
.role-icon{font-size:24px;flex-shrink:0;}
.role-info{flex:1;display:flex;flex-direction:column;gap:2px;}
.role-label{font-size:14px;font-weight:600;color:var(--text);}
.role-desc{font-size:11px;color:var(--text3);}
.role-arrow{font-size:16px;color:var(--text3);}
.role-back-btn{
  background:none;border:none;color:var(--text3);
  font-family:"DM Sans",sans-serif;font-size:12px;
  cursor:pointer;padding:8px 0;width:100%;text-align:center;
  margin-top:4px;
}
.role-back-btn:hover{color:var(--text);}


/* ── LIGHT MODE OVERRIDES ─────────────────────────── */
[data-theme="light"]{
  --bg:#f6f8fa;--bg2:#ffffff;--bg3:#f0f2f4;--bg4:#e8ebee;
  --border:#d0d7de;--border2:#b0b8c1;
  --text:#1c2128;--text2:#373e47;--text3:#636c76;
  --accent:#0969da;--blue:#0969da;
  --green:#1a7f37;--gbg:rgba(26,127,55,.1);
  --amber:#9a6700;--abg:rgba(154,103,0,.1);
  --red:#cf222e;--rbg:rgba(207,34,46,.08);
  --purple:#6e40c9;
}
[data-theme="light"] body{background:var(--bg);}
[data-theme="light"] .eng-card-hdr:hover,[data-theme="light"] .fr-row:hover{background:var(--bg3);}
[data-theme="light"] .full-record,[data-theme="light"] .eng-card{box-shadow:0 1px 3px rgba(0,0,0,.08);}
[data-theme="light"] .stat-card{box-shadow:0 1px 3px rgba(0,0,0,.06);}
[data-theme="light"] .portal-header{background:linear-gradient(135deg,#1B4332 0%,#2D6A4F 100%);}
[data-theme="light"] .ppe-type{color:var(--text);}

/* ── THEME TOGGLE BUTTON ──────────────────────────── */
.theme-toggle{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:4px 10px;
  font-size:14px;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  color:var(--text3);transition:all .2s;
  font-family:"DM Sans",sans-serif;
  white-space:nowrap;
}
.theme-toggle:hover{border-color:var(--accent);color:var(--text);}
.theme-toggle-label{font-size:11px;font-weight:600;display:none;}
@media(min-width:480px){.theme-toggle-label{display:inline;}}

</style>
</head>
<body>

<div class="portal-card">
  <div class="portal-header">
    <img class="portal-logo" src="logo.png" alt="Skyform Wind">
    <div class="portal-title">Skyform Wind Portal</div>
    <div class="portal-sub">Operations Management System</div>
  </div>

  <div class="portal-body">
    <div class="field">
      <label>Username</label>
      <input type="text" id="p-user" placeholder="Enter your username"
        autocomplete="username" autocapitalize="off" autocorrect="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="p-pass" placeholder="Enter your password"
        autocomplete="current-password">
    </div>
    <button class="login-btn" id="p-btn" onclick="doPortalLogin()">Sign In →</button>
    <div class="err" id="p-err"></div>
    <div class="loading-msg" id="p-loading"></div>

    <div class="status-row">
      <span class="status-dot">System live</span>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9728;</button>
    </div>
  </div>
</div>

<div class="portal-footer">
  Skyform (Scotland) Limited &nbsp;·&nbsp; SC165115<br>
  <a href="#">skyform-portal.netlify.app</a>
</div>

<script>
var SUPA_URL = "https://tdbgakmhkwzyaczqjrxw.supabase.co";
var SUPA_KEY = "sb_publishable_9oyvfPblr9XVvFZixKJMrg_qX8cCFIK";

var _engMap  = {};
var _mgmtMap = {};
var _loaded  = false;

// Load both user tables on page load
async function loadUsers() {
  try {
    var [engRes, mgmtRes] = await Promise.all([
      fetch(SUPA_URL + "/rest/v1/engineers?select=name,username,pw_hash", {
        headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}
      }),
      fetch(SUPA_URL + "/rest/v1/management_users?select=name,username,pw_hash", {
        headers:{"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY}
      })
    ]);
    var engs  = await engRes.json();
    var mgmts = await mgmtRes.json();

    // Build name->engineer lookup for dual-role detection
    var engByName = {};
    engs.forEach(function(r){
      if(r.username) _engMap[r.username.toLowerCase()] = {name:r.name, hash:r.pw_hash, type:'engineer'};
      engByName[r.name.toLowerCase()] = {name:r.name, hash:r.pw_hash, username:r.username};
    });
    mgmts.forEach(function(r){
      if(!r.username) return;
      var mgmtRec = {name:r.name, hash:r.pw_hash, type:'management'};
      // Check if this management user also exists as an engineer (by name)
      var engMatch = engByName[r.name.toLowerCase()];
      if(engMatch) mgmtRec.dualEng = engMatch;
      _mgmtMap[r.username.toLowerCase()] = mgmtRec;
    });
    _loaded = true;
    document.getElementById('p-loading').textContent = '';
  } catch(e) {
    document.getElementById('p-loading').textContent = 'Connection issue — please refresh';
  }
}

async function sha256hex(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}

async function doPortalLogin() {
  var username = (document.getElementById('p-user').value||'').trim();
  var password = document.getElementById('p-pass').value||'';
  var err = document.getElementById('p-err');
  var btn = document.getElementById('p-btn');

  err.textContent = '';
  if(!username){ err.textContent = 'Please enter your username'; return; }
  if(!password){ err.textContent = 'Please enter your password'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';

  if(!_loaded) {
    document.getElementById('p-loading').textContent = 'Loading...';
    await loadUsers();
    document.getElementById('p-loading').textContent = '';
  }

  var key  = username.toLowerCase();
  var hash = await sha256hex(password);

  var mgmt = _mgmtMap[key];
  var eng  = _engMap[key];

  // ── DUAL ROLE: management user who also has an engineer record ───
  if(mgmt && mgmt.dualEng && hash === mgmt.hash) {
    btn.disabled = false; btn.textContent = 'Sign In →';
    showRolePicker(username, mgmt, mgmt.dualEng);
    return;
  }

  // ── MANAGEMENT ONLY ───────────────────────────────────────────────
  if(mgmt) {
    if(hash !== mgmt.hash){ err.textContent = 'Incorrect password — please try again'; btn.disabled=false; btn.textContent='Sign In →'; return; }
    sessionStorage.setItem('skyform_mgmt_session', JSON.stringify({ username: username, name: mgmt.name }));
    window.location.href = 'skyform_ppe_live.html';
    return;
  }

  // ── ENGINEER ONLY ─────────────────────────────────────────────────
  if(eng) {
    if(hash !== eng.hash){ err.textContent = 'Incorrect password — please try again'; btn.disabled=false; btn.textContent='Sign In →'; return; }
    var displayName = username.slice(0,2).toUpperCase() + username.slice(2);
    sessionStorage.setItem('skyform_eng_session', JSON.stringify({ username: displayName, name: eng.name }));
    window.location.href = 'skyform_ppe.html';
    return;
  }

  err.textContent = 'Username not recognised — please check and try again';
  btn.disabled = false;
  btn.textContent = 'Sign In →';
}

function showRolePicker(username, mgmt, eng) {
  var card = document.querySelector('.portal-card');
  card.innerHTML = [
    '<div class="portal-header">',
      '<img class="portal-logo" src="logo.png" alt="Skyform Wind">',
      '<div class="portal-title">Welcome, ' + mgmt.name.split(' ')[0] + '</div>',
      '<div class="portal-sub">Select how you want to sign in today</div>',
    '</div>',
    '<div class="portal-body">',
      '<p style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:18px;">',
        'You have access to both areas. Choose one to continue.',
      '</p>',
      '<button class="role-btn role-btn-eng" onclick="pickRole(\'engineer\', \''+username+'\')">',
        '<span class="role-icon">🦺</span>',
        '<span class="role-info">',
          '<span class="role-label">PPE Register</span>',
          '<span class="role-desc">Submit &amp; manage your PPE items</span>',
        '</span>',
        '<span class="role-arrow">→</span>',
      '</button>',
      '<button class="role-btn role-btn-mgmt" onclick="pickRole(\'management\', \''+username+'\')">',
        '<span class="role-icon">📊</span>',
        '<span class="role-info">',
          '<span class="role-label">Management Dashboard</span>',
          '<span class="role-desc">Live view, verification &amp; team oversight</span>',
        '</span>',
        '<span class="role-arrow">→</span>',
      '</button>',
      '<button class="role-back-btn" onclick="location.reload()">← Back</button>',
    '</div>',
  ].join('');

  // Store both sessions ready for use
  window._dualMgmt = { username: username, name: mgmt.name };
  window._dualEng  = { username: username.slice(0,2).toUpperCase()+username.slice(2), name: eng.name };
}

function pickRole(role, username) {
  if(role === 'engineer') {
    sessionStorage.setItem('skyform_eng_session', JSON.stringify(window._dualEng));
    window.location.href = 'skyform_ppe.html';
  } else {
    sessionStorage.setItem('skyform_mgmt_session', JSON.stringify(window._dualMgmt));
    window.location.href = 'skyform_ppe_live.html';
  }
}

// Wire up Enter key
document.addEventListener('DOMContentLoaded', function(){
  loadUsers();
  document.getElementById('p-pass').addEventListener('keydown', function(e){
    if(e.key === 'Enter') doPortalLogin();
  });
  document.getElementById('p-user').addEventListener('keydown', function(e){
    if(e.key === 'Enter') document.getElementById('p-pass').focus();
  });
});

// ── THEME SYSTEM ─────────────────────────────────────────────────────
(function(){
  var saved = localStorage.getItem('skyform_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
})();

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('skyform_theme', next);
  updateThemeBtn();
}

function updateThemeBtn() {
  var theme = document.documentElement.getAttribute('data-theme') || 'dark';
  var btns = document.querySelectorAll('.theme-toggle');
  btns.forEach(function(btn){
    btn.innerHTML = theme === 'dark'
      ? '&#9728; <span class="theme-toggle-label">Light</span>'
      : '&#9790; <span class="theme-toggle-label">Dark</span>';
    btn.title = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
  });
}

document.addEventListener('DOMContentLoaded', function(){ updateThemeBtn(); });

</script>
</body>
</html>
